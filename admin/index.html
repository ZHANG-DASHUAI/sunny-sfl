<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐盒后台</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f2ea;
      color: #3f3328;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px 14px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 34%),
        linear-gradient(135deg, #fff8ec, #eef6ff);
    }

    .admin-shell {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .admin-card {
      margin-bottom: 16px;
      padding: 18px;
      border: 1px solid rgba(120, 91, 60, 0.15);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 50px rgba(83, 61, 42, 0.12);
      backdrop-filter: blur(18px);
    }

    h1,
    h2 {
      margin: 0 0 10px;
    }

    h1 {
      font-size: 26px;
    }

    h2 {
      font-size: 18px;
    }

    .muted {
      margin: 0;
      color: #7d7168;
      font-size: 14px;
      line-height: 1.7;
    }

    .login-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    input,
    button {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(108, 83, 62, 0.2);
      font: inherit;
    }

    input {
      flex: 1;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.92);
    }

    button {
      padding: 0 18px;
      background: #5f8fc9;
      color: #fff;
      border: 0;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(95, 143, 201, 0.12);
      color: #3d6c9d;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(105, 83, 65, 0.12);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #6c5b4c;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(95, 143, 201, 0.12);
      color: #3d6c9d;
      white-space: nowrap;
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      color: #7d7168;
      font-size: 14px;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 760px) {
      body {
        padding: 18px 10px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .login-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="admin-shell">
    <section class="admin-card" id="loginCard">
      <h1>音乐盒隐藏后台</h1>
      <p class="muted">输入后台密码后查看最近访问、最近播放、排行榜和最后在线时间。</p>
      <div class="login-row">
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="后台密码">
        <button id="loginButton" type="button">进入后台</button>
      </div>
      <p class="status" id="loginStatus"></p>
    </section>

    <section id="dashboard" hidden>
      <div class="admin-card toolbar">
        <div>
          <h1>音乐盒统计</h1>
          <p class="muted" id="lastAccessText">最后在线时间：--</p>
        </div>
        <div>
          <button id="refreshButton" type="button">刷新</button>
          <button id="logoutButton" type="button" class="secondary">退出</button>
        </div>
      </div>

      <div class="grid">
        <section class="admin-card">
          <h2>播放排行榜</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>歌名</th>
                  <th>songId</th>
                  <th>累计播放</th>
                  <th>最后播放</th>
                </tr>
              </thead>
              <tbody id="rankingBody"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-card">
          <h2>最近切歌</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>来源</th>
                  <th>从</th>
                  <th>到</th>
                  <th>模式</th>
                </tr>
              </thead>
              <tbody id="switchBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <section class="admin-card">
        <h2>最近播放</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>歌名</th>
                <th>songId</th>
                <th>模式</th>
                <th>设备</th>
                <th>页面</th>
              </tr>
            </thead>
            <tbody id="playsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-card">
        <h2>最近访问</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>页面</th>
                <th>设备</th>
                <th>UserAgent</th>
              </tr>
            </thead>
            <tbody id="visitsBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
